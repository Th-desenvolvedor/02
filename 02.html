 <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Congresso de Tecnologia</title>
    <link rel="stylesheet" href="style.css">
</head>
   <body>
    <div class="container">
        <h2>Inscrição - Congresso de Tecnologia</h2>
        <p class="subtitle">Preencha todos os campos corretamente para garantir sua vaga.</p>
        
        <form id="cadastroForm" novalidate>
            <div class="form-section">
                <h3>Dados Pessoais</h3>
                
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" required minlength="3">
                </div>

                <div class="form-row">
                    <div class="form-group flex-3">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group flex-1">
                        <label for="senha">Senha (mín. 7 caracteres)</label>
                        <input type="password" id="senha" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="telefone">Telefone (com DDD)</label>
                        <input type="text" id="telefone" placeholder="(00) 00000-0000" maxlength="15" required>
                    </div>
                    <div class="form-group">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
                    </div>
                    <div class="form-group">
                        <label for="sexo">Sexo</label>
                        <select id="sexo" required>
                            <option value="">Selecione...</option>
                            <option value="M">Masculino</option>
                            <option value="F">Feminino</option>
                            <option value="O">Outro</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group flex-2">
                        <label for="endereco">Endereço Completo</label>
                        <input type="text" id="endereco" required>
                    </div>
                    <div class="form-group">
                        <label for="cep">CEP</label>
                        <input type="text" id="cep" placeholder="00000-000" maxlength="9" required>
                    </div>
                    <div class="form-group">
                        <label for="cidade">Cidade</label>
                        <input type="text" id="cidade" required>
                    </div>
                    <div class="form-group">
                        <label for="uf">UF</label>
                        <select id="uf" required>
                            <option value="">--</option>
                            <option value="SP">SP</option>
                            <option value="RJ">RJ</option>
                            <option value="MG">MG</option>
                            <option value="PE">PE</option>
                            <option value="BA">BA</option>
                            <option value="RS">RS</option>
                            <option value="SC">SC</option>
                            <option value="DF">DF</option>
                            <option value="GO">GO</option>
                            <option value="ES">ES</option>
                            <option value="MA">MA</option>
                            <option value="CE">CE</option>
                            <option value="PB">PB</option>
                            <option value="PI">PI</option>
                            <option value="RN">RN</option>
                            <option value="AL">AL</option>
                            <option value="SE">SE</option>
                            
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>Dados Profissionais</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="cargo">Cargo</label>
                        <input type="text" id="cargo" required>
                    </div>
                    <div class="form-group">
                        <label for="empresa">Empresa</label>
                        <input type="text" id="empresa" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="tempoProfissao">Tempo de Profissão (anos)</label>
                        <input type="number" id="tempoProfissao" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="salario">Salário (R$)</label>
                        <input type="text" id="salario" placeholder="0,00" required>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>Palestras Desejadas (Selecione uma ou mais)</h3>
                <div class="checkbox-grid" id="palestrasContainer">
                    <label class="checkbox-label">
                        <input type="checkbox" name="palestras" value="p1"> Inteligência Artificial e o Futuro do Trabalho
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="palestras" value="p2"> Arquitetura de Microsserviços Moderna
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="palestras" value="p3"> Segurança da Informação na Era da Nuvem
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="palestras" value="p4"> Desenvolvimento Web com Frameworks Reativos
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="palestras" value="p5"> Metodologias Ágeis e Cultura DevOps
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="palestras" value="p6"> Introdução à Computação Quântica
                    </label>
                </div>
                <div id="erro-palestras" class="error-msg-checkbox"></div>
            </div>

            <div id="mensagemGeral" class="mensagem-geral"></div>

            <button type="submit" id="btnEnviar">Concluir Cadastro</button>
        </form>
    </div>

</body>
</html>
